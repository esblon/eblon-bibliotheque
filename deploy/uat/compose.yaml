name: eblon-bibliotheque-uat

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-app-environment: &app-environment
  env_file:
    - ${RUNTIME_ENV_FILE:-/opt/blon/bibliotheque/runtime/app.env}

services:
  postgres:
    image: postgres:17.6-alpine3.22
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be supplied at compose runtime}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be supplied at compose runtime}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be supplied at compose runtime}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    mem_limit: 700m
    cpus: 0.75
    logging: *default-logging

  migrate:
    build:
      context: ../..
      target: migration
    image: eblon-bibliotheque-migration:uat
    <<: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
    networks: [backend]
    restart: "no"
    mem_limit: 350m
    cpus: 0.5
    logging: *default-logging

  app:
    build:
      context: ../..
      target: runtime
      args:
        NEXT_PUBLIC_APP_URL: https://uat.biblio.blon-enterprises.com
    image: eblon-bibliotheque:uat
    <<: *app-environment
    expose: ["3000"]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks: [frontend, backend]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    mem_limit: 650m
    cpus: 0.75
    logging: *default-logging

  caddy:
    image: caddy:2.10.2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    networks: [frontend]
    restart: unless-stopped
    mem_limit: 160m
    cpus: 0.25
    logging: *default-logging

networks:
  frontend: {}
  backend:
    internal: true

volumes:
  postgres_data: {}
  caddy_data: {}
  caddy_config: {}
